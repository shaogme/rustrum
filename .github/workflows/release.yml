name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI for ${{ matrix.job.target }}
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, bin: rustrum-cli, name: rustrum-cli-linux }
          - { os: macos-latest, target: x86_64-apple-darwin, bin: rustrum-cli, name: rustrum-cli-macos-x64 }
          - { os: macos-latest, target: aarch64-apple-darwin, bin: rustrum-cli, name: rustrum-cli-macos-arm64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, bin: rustrum-cli.exe, name: rustrum-cli-windows }
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.job.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.job.target }} --bin rustrum-cli

      - name: Package Binary (Windows)
        if: matrix.job.os == 'windows-latest'
        shell: pwsh
        run: |
          cd target/${{ matrix.job.target }}/release
          Compress-Archive -Path ${{ matrix.job.bin }} -DestinationPath ../../../${{ matrix.job.name }}.zip

      - name: Package Binary (Unix)
        if: matrix.job.os != 'windows-latest'
        run: |
          cd target/${{ matrix.job.target }}/release
          tar -czf ../../../${{ matrix.job.name }}.tar.gz ${{ matrix.job.bin }}

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.job.name }}
          path: |
            *.zip
            *.tar.gz

  build-sdk:
    name: Build SDK and Pack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Install Rust toolchain (for wasm-pack)
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        uses: qmaru/wasm-pack-action@v0.6.0
        with:
          version: 'latest'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@main
        with:
          node-version: 23
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter rustrum-sdk build

      - name: Pack SDK
        run: |
          cd packages/sdk
          pnpm pack --pack-destination ../../

      - name: Zip SDK dist folder
        run: |
          cd packages/sdk/dist
          zip -r ../../../rustrum-sdk-dist.zip .

      - name: Upload SDK Artifacts
        uses: actions/upload-artifact@main
        with:
          name: rustrum-sdk-artifacts
          path: |
            *.tgz
            rustrum-sdk-dist.zip

  create-release:
    name: Create Release
    needs: [build-cli, build-sdk]
    runs-on: ubuntu-latest
    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@main
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

