name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install FFmpeg & FFprobe
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Run Cargo Tests
        run: cargo test

  test-web:
    name: Web and SDK Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Install Rust toolchain (for wasm-pack)
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        uses: qmaru/wasm-pack-action@v0.6.0
        with:
          version: 'latest'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@main
        with:
          node-version: 23
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK (includes WASM build)
        run: pnpm --filter rustrum-sdk build

      - name: Run Web Tests
        run: pnpm --filter web-test test
